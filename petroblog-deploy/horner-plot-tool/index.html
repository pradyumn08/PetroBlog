<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Horner Plot Analysis Tool</title>
    <base href="/PetroBlog/horner-plot-tool/" />
    <link href="../_framework/css/bootstrap/bootstrap.min.css" rel="stylesheet" />
    <link href="../_framework/css/app.css" rel="stylesheet" />
    <link href="../_framework/HornerPlotBlazorApp.styles.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="../favicon.png" />
    <style>
        .loading-progress {
            position: relative;
            display: block;
            width: 8rem;
            height: 8rem;
            margin: 20vh auto 1rem auto;
        }
        
        .loading-progress circle {
            fill: none;
            stroke: #e0e0e0;
            stroke-width: 0.6rem;
            transform-origin: 50% 50%;
            transform: rotate(-90deg);
        }
        
        .loading-progress circle:last-child {
            stroke: #1a5276;
            stroke-dasharray: calc(3.141 * var(--blazor-load-percentage, 0%) * 0.8), 500%;
            transition: stroke-dasharray 0.05s ease-in-out;
        }
        
        .loading-progress-text {
            position: absolute;
            text-align: center;
            font-weight: bold;
            inset: calc(20vh + 3.25rem) 0 auto 0.2rem;
        }
        
        .loading-progress-text:after {
            content: var(--blazor-load-percentage-text, "Loading");
        }
        
        .blazor-error-ui {
            background: lightyellow;
            bottom: 0;
            box-shadow: 0 -1px 2px rgba(0, 0, 0, 0.2);
            display: none;
            left: 0;
            padding: 0.6rem 1.25rem 0.7rem 1.25rem;
            position: fixed;
            width: 100%;
            z-index: 1000;
        }
        
        .blazor-error-ui .dismiss {
            cursor: pointer;
            position: absolute;
            right: 0.75rem;
            top: 0.5rem;
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="loading-progress">
            <svg>
                <circle r="40%" cx="50%" cy="50%" />
                <circle r="40%" cx="50%" cy="50%" />
            </svg>
            <div class="loading-progress-text"></div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    
    <script src="../_framework/blazor.webassembly.js"></script>
    <script>navigator.serviceWorker.register('service-worker.js');</script>
    
    <!-- Chart.js Library (must be before ChartJs interop) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.4/dist/Chart.min.js"></script>
    
    <!-- ChartJS Blazor Interop -->
    <script src="../_content/ChartJs.Blazor.Fork/ChartJsBlazorInterop.js"></script>
    
    <!-- Custom Chart.js Interop Helper -->
    <script src="../_framework/js/chartJsInterop.js"></script>
</body>
</html>
